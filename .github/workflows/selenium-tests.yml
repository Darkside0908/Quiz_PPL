name: Selenium Tests (Login & Register)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  selenium-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # koneksi.php TIDAK diubah: host=localhost, user=root, password="",
      # db=quiz_pengupil. Supaya tetap begitu, MySQL dipasang & dikonfigurasi
      # langsung di runner (bukan lewat GitHub Actions "services" container),
      # agar koneksi via "localhost" (unix socket) dan kredensial root tanpa
      # password persis sama seperti yang diharapkan koneksi.php.
      - name: Install & configure MySQL to match koneksi.php credentials
        run: |
          sudo systemctl start mysql.service
          sudo mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '';"
          sudo mysql -e "FLUSH PRIVILEGES;"
          sudo mysql -e "CREATE DATABASE IF NOT EXISTS quiz_pengupil;"
          mysql -u root -h 127.0.0.1 -e "SELECT 1;"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mysqli
          tools: none

      - name: Import database schema
        run: mysql -u root quiz_pengupil < db/quiz_pengupil.sql

      - name: Seed test user (test driver, uses koneksi.php as-is)
        run: php tests/seed.php

      # output_buffering diaktifkan sebagai KONFIGURASI RUNTIME server saja
      # (bukan perubahan source code) agar header('Location: ...') pada
      # register.php tetap berfungsi meski HTML sudah mulai dikirim lebih
      # dulu — perilaku yang sama seperti default konfigurasi PHP di XAMPP.
      - name: Start PHP built-in server
        run: |
          php -d output_buffering=4096 -S 127.0.0.1:8000 > php-server.log 2>&1 &
          sleep 2
          curl -sf http://127.0.0.1:8000/login.php > /dev/null

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Selenium tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Show PHP server log on failure
        if: failure()
        run: cat php-server.log || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
